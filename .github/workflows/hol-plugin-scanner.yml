name: Plugin Scanner

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hashgraph-online/ai-plugin-scanner-action@c4737ed2f724bb612bd7df8c63f6835dd34181a3 # v1.2.392 / plugin-scanner 2.0.992 — pinned. TODO: bump forward once shell-injection findings are cleaned up.
        with:
          plugin_dir: "."
          fail_on_severity: high
          format: sarif
          upload_sarif: false
      - name: Dump SARIF (diagnostic — find file:line of findings)
        if: always()
        run: |
          echo "=== SARIF BEGIN ==="
          cat ai-plugin-scanner.sarif 2>/dev/null || echo "(no sarif file)"
          echo "=== SARIF END ==="
